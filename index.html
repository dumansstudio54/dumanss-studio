  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  min-height:100vh;
  min-height:100dvh;
  overflow-x:hidden;
  margin:0;padding:0;
}

/* Splash kaldırıldı */

/* ── LOGIN ── */
#login-screen{
  position:fixed;top:0;left:0;width:100%;height:100%;z-index:9998;
  background:linear-gradient(160deg,#FAF7F0,#F9EFBD,#F5F0E8);
  display:none;flex-direction:column;align-items:center;justify-content:center;
  overflow-y:auto;
}
#login-screen.show{display:flex}
#login-screen.show{display:flex}
.login-top-bar{
  height:3px;
  background:linear-gradient(90deg,var(--cream),var(--gold-light),var(--gold),var(--gold-dark),var(--gold-deep));
}
.login-hero{
  flex:1;display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  padding:32px 24px 0;
  text-align:center;
}
.login-logo-wrap{
  width:110px;height:110px;
  background:white;
  border-radius:50%;
  border:1.5px solid var(--border2);
  display:flex;align-items:center;justify-content:center;
  overflow:hidden;
  box-shadow:0 4px 24px rgba(148,108,24,.15);
  margin-bottom:18px;
}
.login-logo-wrap img{width:95px;height:95px;object-fit:contain}
.login-brand{font-family:Georgia,serif;font-size:20px;font-weight:700;letter-spacing:3px;color:var(--text);margin-bottom:3px}
.login-brand-sub{font-size:9px;letter-spacing:3px;color:var(--gold-dark);margin-bottom:20px}
.login-welcome{font-size:14px;color:var(--text2);line-height:1.7;margin-bottom:24px}
.login-welcome strong{color:var(--text);font-weight:600}

.login-form{width:100%;max-width:380px;padding:0 24px 32px}
.field-group{margin-bottom:14px}
.field-label{font-size:10px;letter-spacing:1.5px;color:var(--gold-dark);font-weight:600;margin-bottom:7px}
.field-input{
  width:100%;padding:13px 15px;
  background:var(--card);
  border:1px solid var(--border);
  border-radius:var(--radius-sm);
  color:var(--text);font-size:14px;
  transition:border-color .2s;
  outline:none;
}
.field-input:focus{border-color:var(--gold)}
.btn-login{
  width:100%;padding:14px;
  background:linear-gradient(135deg,var(--gold-deep),var(--gold-dark),var(--gold));
  color:white;border:none;
  border-radius:var(--radius-sm);
  font-size:13px;font-weight:700;
  letter-spacing:2px;cursor:pointer;
  box-shadow:0 4px 16px rgba(148,108,24,.3);
  transition:opacity .2s;
  margin-bottom:16px;
}
.btn-login:active{opacity:.9}
.login-divider{
  display:flex;align-items:center;gap:10px;
  margin-bottom:12px;
}
.login-divider::before,.login-divider::after{
  content:'';flex:1;height:1px;background:var(--border);
}
.login-divider span{font-size:9px;letter-spacing:1.5px;color:var(--text3)}
.login-hint{font-size:11px;color:var(--text3);text-align:center;line-height:1.7}
.login-footer{
  padding:12px 24px;
  border-top:1px solid var(--border);
  text-align:center;
  font-size:9px;letter-spacing:1px;color:var(--text3);
}

/* ── APP SHELL ── */
#app{display:none;flex-direction:column;min-height:100vh;min-height:100dvh}
#app.show{display:flex}

/* TOP BAR */
.top-bar{
  position:sticky;top:0;z-index:100;
  background:var(--bg);
  border-bottom:1px solid var(--border);
  padding:0 16px;
  height:56px;
  display:flex;align-items:center;gap:10px;
}
.top-bar-logo{
  width:34px;height:34px;
  background:white;border-radius:50%;
  border:1px solid var(--border2);
  overflow:hidden;
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;
}
.top-bar-logo img{width:36px;height:36px;object-fit:contain}
.top-bar-text{flex:1}
.top-bar-title{
  font-size:13px;font-weight:700;
  letter-spacing:2px;color:var(--text);
  font-family:Georgia,serif;
  background:linear-gradient(90deg,var(--gold-dark),var(--gold));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
}
.top-bar-date{font-size:10px;color:var(--text3)}
.top-bar-actions{display:flex;gap:6px}
.icon-btn{
  width:32px;height:32px;border-radius:var(--radius-sm);
  background:var(--card2);border:1px solid var(--border);
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;font-size:15px;
}

/* PAGES */
.page{display:none;flex:1;overflow-y:auto;padding-bottom:72px}
.page.active{display:block}

/* BOTTOM NAV */
.bottom-nav{
  position:fixed;bottom:0;left:0;right:0;z-index:100;
  background:var(--bg);
  border-top:1px solid var(--border);
  display:flex;
  padding-bottom:env(safe-area-inset-bottom);
  box-shadow:0 -4px 20px rgba(148,108,24,.06);
}
.nav-btn{
  flex:1;display:flex;flex-direction:column;align-items:center;
  padding:8px 4px 6px;
  cursor:pointer;border:none;background:transparent;
  color:var(--text3);font-size:10px;gap:3px;
  transition:color .2s;
}
.nav-btn.active{color:var(--gold-dark)}
.nav-icon{font-size:18px;line-height:1}
.nav-label{font-size:9px;letter-spacing:.3px}

/* CARDS & COMPONENTS */
.card{
  background:var(--card);
  border:1px solid var(--border);
  border-radius:var(--radius);
  padding:16px;
  box-shadow:0 1px 8px rgba(148,108,24,.06);
}
.card2{background:var(--card2);border:1px solid var(--border);border-radius:var(--radius);padding:16px}
.section-title{
  font-size:11px;font-weight:600;
  letter-spacing:1.5px;color:var(--gold-dark);
  padding:16px 16px 8px;
  text-transform:uppercase;
}
.metric-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:0 16px 4px}
.metric-card{
  background:var(--card);border:1px solid var(--border);
  border-radius:var(--radius-sm);padding:12px;
}
.metric-label{font-size:11px;color:var(--text3);letter-spacing:1.5px;margin-bottom:8px;text-transform:uppercase;font-weight:500}
.metric-value{font-size:28px;font-weight:700;color:var(--text);font-family:Georgia,serif;letter-spacing:-0.5px}
.metric-sub{font-size:10px;color:var(--text3);margin-top:2px}

/* DERS KARTI */
.ders-item{
  padding:14px 16px;
  border-left:3px solid var(--gold);
  background:var(--card);
  border-radius:0 var(--radius-sm) var(--radius-sm) 0;
  margin:0 20px 10px;
  display:flex;align-items:center;gap:12px;
  box-shadow:0 1px 8px rgba(148,108,24,.06);
}
.ders-saat{font-size:17px;font-weight:700;color:var(--text2);min-width:46px;font-family:Georgia,serif}
.ders-divider{width:1px;height:32px;background:var(--border)}
.ders-info{flex:1}
.ders-ad{font-size:13px;font-weight:600;color:var(--text)}
.ders-alt{font-size:11px;color:var(--text3)}
.ders-badge{
  font-size:9px;padding:3px 8px;border-radius:99px;
  background:rgba(210,169,65,.15);color:var(--gold-dark);
  border:1px solid rgba(210,169,65,.3);white-space:nowrap;
}

/* ALERT BANNERS */
.alert{border-radius:var(--radius-sm);padding:13px 16px;margin:6px 16px;font-size:13px;line-height:1.6}
.a-gold{background:rgba(201,168,76,.15);border:1.5px solid rgba(201,168,76,.4);color:var(--gold-dark);font-weight:500}
.a-red{background:var(--red-bg);border:1px solid var(--red-border);color:var(--red)}
.a-green{background:var(--green-bg);border:1px solid var(--green-border);color:var(--green)}
.a-blue{background:var(--blue-bg);border:1px solid rgba(90,122,154,.25);color:var(--blue)}

/* BUTTONS */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:10px 18px;border-radius:var(--radius-sm);font-size:13px;font-weight:600;cursor:pointer;border:1px solid transparent;transition:opacity .2s}
.btn:active{opacity:.85}
.btn-primary{background:linear-gradient(135deg,var(--gold-deep),var(--gold-dark));color:white;border:none;box-shadow:0 3px 12px rgba(148,108,24,.25)}
.btn-ghost{background:transparent;border-color:var(--border2);color:var(--text2)}
.btn-wa{background:#25D366;color:white;border:none}
.btn-sm{padding:6px 12px;font-size:11px;border-radius:99px}
.b-pilates{background:rgba(148,108,24,.1);color:var(--gold-dark);border:1px solid rgba(148,108,24,.25);border-radius:99px;padding:2px 10px;font-size:11px;font-weight:600}
.b-ems{background:rgba(210,169,65,.1);color:var(--gold);border:1px solid rgba(210,169,65,.3);border-radius:99px;padding:2px 10px;font-size:11px;font-weight:600}

/* FORMS */
select,input,textarea{
  background:var(--card);border:1px solid var(--border);
  border-radius:var(--radius-sm);
  padding:10px 12px;color:var(--text);
  font-size:14px;width:100%;outline:none;
}
select:focus,input:focus{border-color:var(--gold)}

/* OGRENCİ KARTI */
.ogr-card{
  background:var(--card);border:1px solid var(--border);
  border-radius:var(--radius);padding:14px 16px;
  margin:0 16px 10px;
  box-shadow:0 1px 8px rgba(148,108,24,.05);
}
.ogr-name{font-size:15px;font-weight:700;color:var(--text);margin-bottom:6px}
.ogr-row{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.progress-wrap{margin:8px 0 4px}
.progress-bar{height:4px;background:var(--bg3);border-radius:2px;overflow:hidden}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--gold-dark),var(--gold));border-radius:2px;transition:width .4s}

/* TAKVIM */
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;padding:0 16px}
.cal-cell{aspect-ratio:1;display:flex;flex-direction:column;align-items:center;justify-content:center;border-radius:8px;font-size:12px;cursor:pointer;transition:all .15s;padding:2px}
.cal-cell:hover{background:var(--bg3)}
.cal-cell.has-ders{background:#F9EFBD;border:1px solid #D4C8B0;color:#946C18;font-weight:600}
.cal-cell.tatil{background:#FFF0EC;border:1px solid #F4B8A8;color:#C03010;font-weight:600}
.cal-cell.tatil.has-ders{background:#FFE8E0;border:1px solid #F4B8A8;color:#C03010}
.cal-cell.today{background:white;border:2px solid #946C18;color:#946C18;font-weight:700}
.cal-cell.today.has-ders{background:#F5EAC0;border:2px solid #946C18}
.cal-cell.other-month{color:var(--text3)}

/* GELİR GIDER */
.gelir-item{
  display:flex;align-items:center;gap:12px;
  padding:12px 16px;border-bottom:1px solid var(--border);
}
.gelir-icon{font-size:18px}
.gelir-info{flex:1}
.gelir-acik{font-size:13px;color:var(--text);font-weight:500}
.gelir-tarih{font-size:11px;color:var(--text3)}
.gelir-tutar{font-size:15px;font-weight:700}
.gelir-plus{color:var(--green)}
.gelir-minus{color:var(--red)}

/* RESPONSIVE */
@media(min-width:768px){
  body{background:var(--bg3)}
  #app{max-width:480px;margin:0 auto;background:var(--bg);box-shadow:0 0 60px rgba(0,0,0,.1)}
  .top-bar{border-radius:0}
  /* login-screen tam ekran */
  #splash{max-width:100%;margin:0}
}

/* GOLD SHIMMER animation */
@keyframes shimmer{
  0%{background-position:-200% center}
  100%{background-position:200% center}
}
.gold-shimmer{
  background:linear-gradient(90deg,var(--gold-deep),var(--gold-light),var(--gold-dark));
  background-size:200% auto;
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  animation:shimmer 3s linear infinite;
}

/* LOADING BAR */
#yl-bar{position:fixed;top:0;left:0;right:0;height:2px;z-index:9999;background:linear-gradient(90deg,var(--cream),var(--gold-light),var(--gold),var(--gold-dark));animation:loadBar 1.5s ease infinite}
@keyframes loadBar{0%{opacity:.6}50%{opacity:1}100%{opacity:.6}}

/* ── RESPONSIVE ── */
@media(min-width:768px){
  body{background:#EDE8DC}
  #app{
    max-width:1400px;
    margin:0 auto;
    background:var(--bg);
    box-shadow:0 0 40px rgba(148,108,24,.08);
    height:100vh;
    overflow:hidden;
    grid-template-columns:220px 1fr;
    grid-template-rows:56px 1fr;
  }
  #app.show{display:grid !important}
  .top-bar{
    grid-column:1/-1;
    grid-row:1;
    padding:0 20px;
  }
  .side-nav-desktop{
    display:flex !important;
    grid-row:2;
    grid-column:1;
    overflow-y:auto;
  }
  .bottom-nav{display:none !important}
  .page{
    grid-row:2;
    grid-column:2;
    padding-bottom:0 !important;
    overflow-y:auto;
    height:calc(100vh - 56px);
  }
  #login-screen{
    position:fixed;
    top:0;left:0;
    width:100vw;height:100vh;
    z-index:9998;
  }
  #splash{
    position:fixed;
    top:0;left:0;
    width:100vw;height:100vh;
    z-index:9999;
  }
  .metric-grid{grid-template-columns:repeat(4,1fr)}
}
@media(min-width:1200px){
  #app{grid-template-columns:250px 1fr;max-width:1600px}
}

.side-nav-desktop{
  display:none;
  flex-direction:column;
  padding:16px 12px;
  border-right:1px solid var(--border);
  background:var(--bg);
  gap:2px;
  overflow-y:auto;
}
.snav-btn{
  display:flex;align-items:center;gap:10px;
  padding:10px 14px;border-radius:var(--radius-sm);
  background:transparent;border:none;cursor:pointer;
  color:var(--text2);font-size:13px;font-weight:500;
  text-align:left;width:100%;transition:all .15s;
}
.snav-btn:hover{background:var(--card2);color:var(--text)}
.snav-btn.active{background:var(--gold-bg);color:var(--gold-dark);font-weight:600}
.snav-section{font-size:9px;color:var(--text3);letter-spacing:1.5px;padding:12px 14px 4px;text-transform:uppercase}

@media(min-width:768px){
  .section-title{padding:20px 24px 10px}
  .metric-grid{padding:0 24px 8px}
  .ogr-card{margin:0 24px 12px}
  .ders-item{margin:0 24px 10px}
  .alert{margin:8px 24px}
  #ana-c,#ogr-c,#ekle-c,#takvim-c,#gelir-c,#olcum-c,#bildirimler-c,#mesajlar-c,#diyet-c{
    max-width:1000px;
    margin:0 auto;
    padding:0 0 24px;
  }
}

@keyframes shake{
  0%,100%{transform:translateX(0)}
  25%{transform:translateX(-8px)}
  75%{transform:translateX(8px)}
}</style>

function ogrToRow(o) {

    tur:o.tur||'pilates', paket:o.paket||20, ucret:o.ucret||0,

    ilk_odeme_alindi:o.ilkOdemeAlindi??true
  };
}
function rowToOgr(r) {
  return {
    _id:r.id, ad:r.ad, tel:r.tel||'', mail:r.mail||'',
    tur:r.tur||'pilates', paket:r.paket||20, ucret:r.ucret||0,
    toplam_paket:r.toplam_paket||r.paket||20,
    baslangic:r.baslangic||null, yapilan:r.yapilan||0, borc:r.borc||0,
    saat:r.saat||'', gunler:r.gunler||[], iptalHakki:r.iptal_hakki??1,
    iptalGecmisi:r.iptal_gecmisi||[], odemeBekliyor:r.odeme_bekliyor||false,
    ilkOdemeAlindi:r.ilk_odeme_alindi??true
  };
}
function gelirToRow(g) { return {id:g._id||undefined,tip:g.tip,tutar:g.tutar,acik:g.acik||'',tarih:g.tarih}; }
function rowToGelir(r) { return {_id:r.id,tip:r.tip,tutar:r.tutar,acik:r.acik||'',tarih:r.tarih}; }

async function veriYukle() {
  const [{data:ogrs,error:e1},{data:gelirs,error:e2}] = await Promise.all([
    sb.from('ogrenciler').select('*').order('created_at',{ascending:true}),
    sb.from('gelir_gider').select('*').order('tarih',{ascending:false})
  ]);
  if(!e1 && ogrs) data = ogrs.map(rowToOgr);
  if(!e2 && gelirs) gelirData = gelirs.map(rowToGelir);
}
async function ogrKaydet(o) {
  const row = ogrToRow(o);
  if(o._id) {
    const {error} = await sb.from('ogrenciler').update(row).eq('id',o._id);
    if(error) throw error;
  } else {
    const {data:d,error} = await sb.from('ogrenciler').insert(row).select().single();
    if(error) throw error;
    o._id = d.id;
  }
}
async function ogrSilDB(id) {
  const {error} = await sb.from('ogrenciler').delete().eq('id',id);
  if(error) throw error;
}
async function gelirKaydet(g) {
  const {error} = await sb.from('gelir_gider').insert(gelirToRow(g));
  if(error) throw error;
}
async function gelirSilDB(id) {
  const {error} = await sb.from('gelir_gider').delete().eq('id',id);
  if(error) throw error;
}

// ── YARDIMCI ──
function pad(n){return String(n).padStart(2,'0')}
function todayStr(){const d=new Date();return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`}
function kalanDers(o){
  // Toplam paket = tüm paketlerin toplamı (toplam_paket alanı varsa onu kullan)
  const toplamPaket = (o.toplam_paket||o.paket||0);
  return Math.max(0, toplamPaket - (o.yapilan||0));
}
function efektifKalan(o){return kalanDers(o)-(o.borc||0)}
function getBitis(o){
  if(!o.baslangic||!o.gunler||!o.gunler.length) return null;
  const b=new Date(o.baslangic);
  let say=0,d=new Date(b);
  const gk=o.paket||20;
  while(say<gk){if(o.gunler.includes(d.getDay()))say++;if(say<gk)d.setDate(d.getDate()+1);}
  return d;
}
function gecikmiMi(o){
  const bit=getBitis(o);
  if(!bit) return false;
  return bit<new Date() && kalanDers(o)>0;
}
function gunAdi(g){return ['Paz','Pzt','Sal','Çar','Per','Cum','Cmt'][g]||''}
function gosterYukleniyor(){let el=document.getElementById('yl-bar');if(!el){el=document.createElement('div');el.id='yl-bar';document.body.appendChild(el);}}
function gizleYukleniyor(){const el=document.getElementById('yl-bar');if(el)el.remove();}

async function renderAnaOlcumOzeti() {
  try {
    const {data:olcumD} = await sb.from('olcumler')
      .select('ogrenci_id,kilo,yag_yuzdesi,kas_yuzdesi,tarih')
      .order('tarih',{ascending:false})
      .limit(50);
    
    if(!olcumD||!olcumD.length) return;
    
    // Her öğrenci için son 2 ölçümü al
    const ogrMap = {};
    olcumD.forEach(o=>{
      if(!ogrMap[o.ogrenci_id]) ogrMap[o.ogrenci_id]=[];
      if(ogrMap[o.ogrenci_id].length<2) ogrMap[o.ogrenci_id].push(o);
    });
    
    // Değişim olan öğrencileri filtrele
    const degisimler = [];
    Object.entries(ogrMap).forEach(([ogrid, ols])=>{
      if(ols.length<2) return;
      const ogr = data.find(d=>d._id===ogrid||d._id==ogrid);
      if(!ogr) return;
      const fark = ((ols[0].kilo||0)-(ols[1].kilo||0)).toFixed(1);
      degisimler.push({
        ad:ogr.ad.split(' ')[0],
        son:ols[0].kilo,
        fark:parseFloat(fark),
        tarih:ols[0].tarih
      });
    });
    
    if(!degisimler.length) return;
    
    // Özet kartı ekle
    const anaEl = document.getElementById('ana-c');
    if(!anaEl) return;
    
    const ozDiv = document.createElement('div');
    ozDiv.style.cssText='margin:0 16px 12px';
    
    const maxFark = Math.max(...degisimler.map(d=>Math.abs(d.fark)),0.1);
    
    ozDiv.innerHTML = `<div class="section-title">📏 VÜCUT ÖLÇÜMLERİ — SON DEĞİŞİM</div>
      <div class="card" style="padding:14px 16px">
        <div style="display:flex;flex-direction:column;gap:8px">
          ${degisimler.sort((a,b)=>Math.abs(b.fark)-Math.abs(a.fark)).map(d=>{
            const barW = Math.round((Math.abs(d.fark)/maxFark)*100);
            const renk = d.fark<0?'var(--green)':d.fark>0?'var(--red)':'var(--text3)';
            const ikon = d.fark<0?'↓':d.fark>0?'↑':'→';
            return `<div style="display:flex;align-items:center;gap:10px">
              <div style="width:80px;font-size:12px;font-weight:600;color:var(--text);flex-shrink:0">${d.ad}</div>
              <div style="flex:1;height:8px;background:var(--bg3);border-radius:4px;overflow:hidden">
                <div style="width:${barW}%;height:100%;background:${renk};border-radius:4px;transition:width .5s"></div>
              </div>
              <div style="width:60px;text-align:right;font-size:12px;font-weight:700;color:${renk};flex-shrink:0">${d.fark>0?'+':''}${d.fark} kg ${ikon}</div>
              <div style="width:40px;text-align:right;font-size:11px;color:var(--text3);flex-shrink:0">${d.son||'?'} kg</div>
            </div>`;
          }).join('')}
        </div>
        <div style="font-size:10px;color:var(--text3);margin-top:10px;text-align:right">Son 2 ölçüm karşılaştırması</div>
      </div>`;
    
    anaEl.appendChild(ozDiv);
  } catch(e) { console.log('Ölçüm özeti yüklenemedi:', e); }
}

  if(!data.length) {el.innerHTML='<div class="alert a-blue" style="margin-top:12px">Henüz öğrenci yok.</div>';return;}
  let html = `<div style="padding:12px 16px 8px;display:flex;gap:8px">
    <input type="text" id="ogr-ara" placeholder="Öğrenci ara..." style="flex:1" oninput="aramaYap(this.value)">
  </div><div id="ogr-liste">`;
  html += data.map((o,i) => ogrKarti(o,i)).join('');
  html += '</div>';
  el.innerHTML = html;
}

function ogrKarti(o,i) {
  const kalan = efektifKalan(o);
  const toplam = o.paket||20;
  const yuzde = Math.max(0,Math.min(100,(kalan/toplam)*100));
  const bit = getBitis(o);
  return `<div class="ogr-card">
    <div style="display:flex;align-items:flex-start;gap:10px">
      <div style="flex:1">
        <div class="ogr-name">${o.ad}</div>
        <div class="ogr-row">
          <span class="b-${o.tur}">${o.tur==='ems'?'⚡ EMS':'🧘 Pilates'}</span>
          ${o.tel?`<span style="font-size:11px;color:var(--text3)">📱 ${o.tel}</span>`:''}
        </div>
      </div>
      <div style="text-align:right;flex-shrink:0">
        <div style="font-size:20px;font-weight:700;color:var(--gold-dark);font-family:Georgia,serif">${kalan}</div>
        <div style="font-size:9px;color:var(--text3)">ders kaldı</div>
      </div>
    </div>
    <div class="progress-wrap">
      <div style="display:flex;justify-content:space-between;font-size:10px;color:var(--text3);margin-bottom:4px">
        <span>${o.yapilan}/${toplam} yapıldı</span>
        ${bit?`<span>Bitiş: ${bit.toLocaleDateString('tr-TR')}</span>`:''}
      </div>
      <div class="progress-bar"><div class="progress-fill" style="width:${yuzde}%"></div></div>
    </div>
    <div style="display:flex;gap:6px;flex-wrap:wrap;margin-top:10px">
      <button class="btn btn-primary btn-sm" onclick="dersEkle(${i})">+1 Ders</button>
      <button class="btn btn-ghost btn-sm" onclick="pakiYenile(${i})">🔄 Paket</button>
      <button class="btn btn-ghost btn-sm" onclick="waAc(${i},'wa')">📱 WA</button>
      <button class="btn btn-ghost btn-sm" onclick="duzenle(${i})">✏️</button>
      <button class="btn btn-ghost btn-sm" style="color:var(--red)" onclick="sil(${i})">🗑</button>
    </div>
  </div>`;
}

function aramaYap(q) {
  const liste = document.getElementById('ogr-liste');
  if(!liste) return;
  const filtre = q.toLowerCase();
  const filtreOgrs = data.filter(o=>o.ad.toLowerCase().includes(filtre)||(o.tel||'').includes(filtre));
  liste.innerHTML = filtreOgrs.map((o)=>ogrKarti(o,data.indexOf(o))).join('');
}

const RESMI_TATILLER = {

  '05-01': '1 Mayis Emek Gunu',
  '05-19': '19 Mayis Ataturk Anma',
  '07-15': '15 Temmuz Demokrasi',
  '08-30': '30 Agustos Zafer',
  '10-28': '28 Ekim Cumhuriyet Arifesi',
  '10-29': '29 Ekim Cumhuriyet',
};

// Dini tatiller (yıla göre değişir - 2025-2026)
const DINI_TATILLER_2025 = {
  '03-30': 'Ramazan Bayramı',
  '03-31': 'Ramazan Bayramı',
  '04-01': 'Ramazan Bayramı',
  '06-06': 'Kurban Bayramı',
  '06-07': 'Kurban Bayramı',
  '06-08': 'Kurban Bayramı',

};
const DINI_TATILLER_2026 = {
  '03-20': 'Ramazan Bayramı',
  '03-21': 'Ramazan Bayramı',
  '03-22': 'Ramazan Bayramı',
  '05-27': 'Kurban Bayramı',
  '05-28': 'Kurban Bayramı',
  '05-29': 'Kurban Bayramı',
  '05-30': 'Kurban Bayramı',
};

function tatilMi(yil, ay, gun) {
  const pad = n => String(n).padStart(2,'0');
  const key = `${pad(ay+1)}-${pad(gun)}`;
  const diniKey = yil === 2026 ? DINI_TATILLER_2026[key] : DINI_TATILLER_2025[key];
  return RESMI_TATILLER[key] || diniKey || null;
}


// ── DERS İPTAL ──
async function dersIptalEt(idlerStr, saat) {
  const idler = idlerStr.split(',').map(Number);
  const ogrs = idler.map(i=>data[i]).filter(Boolean);
  if(!ogrs.length) return;
  const isimler = ogrs.map(o=>o.ad).join(', ');
  const neden = prompt(`${saat} - ${isimler} dersi iptal ediliyor.\nİptal sebebi:\n1) Öğrenci isteği (iptal hakkı kullanılır)\n2) Stüdyo kararı (iptal hakkı kullanılmaz)\n\n1 veya 2 girin:`);
  if(!neden) return;
  const ogrenciIstegi = neden.trim() === '1';
  const bugun = new Date().toISOString().split('T')[0];
  gosterYükleme();
  try {
    for(const o of ogrs) {
      const updates = {};
      if(ogrenciIstegi) {
        // İptal hakkı kullan
        const mevcutGecmis = o.iptal_gecmisi||[];
        mevcutGecmis.push(bugun);
        updates.iptal_gecmisi = mevcutGecmis;
        // yapilan değişmez, ders sayısı düşmez (zaten işlenmedi)
      }
      // Her iki durumda da ders sayısı artmaz (iptal = işlenmedi)
      if(Object.keys(updates).length > 0) {
        await sb.from('ogrenciler').update(updates).eq('id', o._id);
      }
    }
    const mesaj = ogrenciIstegi 
      ? `✅ ${isimler} dersi iptal edildi. İptal hakkı kullanıldı.`
      : `✅ ${isimler} dersi stüdyo kararıyla iptal edildi. İptal hakkı kullanılmadı.`;
    alert(mesaj);
    await yukleData();
    renderAna();
  } catch(e) { alert('Hata: ' + e.message); }
  gizleYükleme();
}

// ── OTOMATIK DERS İŞLEME (gün sonu) ──
// Gün içinde iptal edilmemiş dersler otomatik işlendi sayılır
// Bu kontrol renderAna'da her açılışta çalışır
async function gunSonuOtomatikIsle() {
  const bugun = new Date();
  const saat = bugun.getHours();
  // Gece 23:00'dan sonra o günün derslerini işle
  if(saat < 23) return;
  
  const gun = bugun.getDay();
  const bugunDersler = data.filter(o => 
    (o.gunler||[]).includes(gun) && efektifKalan(o) > 0
  );
  
  if(!bugunDersler.length) return;
  
  const bugunStr = bugun.toISOString().split('T')[0];
  const sonIsleKey = 'son_isle_' + bugunStr;
  if(localStorage.getItem(sonIsleKey)) return; // Bugün zaten işlendi
  
  if(!confirm(`Gün sonu: ${bugunDersler.length} öğrencinin bugünkü dersi otomatik işlensin mi?\n\n${bugunDersler.map(o=>o.ad).join(', ')}`)) return;
  
  gosterYükleme();
  try {
    for(const o of bugunDersler) {
      const yeniYapilan = (o.yapilan||0) + 1;
      await sb.from('ogrenciler').update({yapilan: yeniYapilan}).eq('id', o._id);
    }
    localStorage.setItem(sonIsleKey, '1');
    alert(`✅ ${bugunDersler.length} öğrencinin dersi işlendi!`);
    await yukleData();
    renderAna();
  } catch(e) { alert('Hata: ' + e.message); }
  gizleYükleme();
}

// ── TAKVIM ──
function renderTakvim() {
  const el=document.getElementById('takvim-c');
  const bugun=new Date();
  const ay=bugun.getMonth();const yil=bugun.getFullYear();
  const aylar=['Ocak','Şubat','Mart','Nisan','Mayıs','Haziran','Temmuz','Ağustos','Eylül','Ekim','Kasım','Aralık'];
  const ilk=new Date(yil,ay,1);
  const son=new Date(yil,ay+1,0);
  let html=`<div class="section-title">${aylar[ay]} ${yil}</div>
  <div style="display:grid;grid-template-columns:repeat(7,1fr);gap:2px;padding:0 16px 8px;text-align:center">
    ${['Pzt','Sal','Çar','Per','Cum','Cmt','Paz'].map(g=>`<div style="font-size:10px;color:var(--text3);padding:6px 0">${g}</div>`).join('')}
  </div>
  <div class="cal-grid">`;
  let bPazar=(ilk.getDay()+6)%7;
  for(let i=0;i<bPazar;i++) html+=`<div class="cal-cell other-month"></div>`;
  for(let g=1;g<=son.getDate();g++) {
    const tarih=new Date(yil,ay,g);
    const gun=tarih.getDay();
    const hasDers=data.some(o=>o.gunler&&o.gunler.includes(gun)&&efektifKalan(o)>0);
    const isToday=g===bugun.getDate()&&ay===bugun.getMonth()&&yil===bugun.getFullYear();
    const tatilAdi=tatilMi(yil,ay,g);
    const classes=[
      'cal-cell',
      hasDers?'has-ders':'',
      isToday?'today':'',
      tatilAdi?'tatil':''
    ].filter(Boolean).join(' ');
    const tooltip=tatilAdi?` title="${tatilAdi}"`:'';
    html+=`<div class="${classes}"${tooltip} onclick="takvimGunDetay(${g},${ay},${yil})">
      <span>${g}</span>
      ${tatilAdi?`<div style="font-size:6px;line-height:1.1;margin-top:2px;opacity:.8;text-overflow:ellipsis;overflow:hidden;max-width:100%">${tatilAdi.split(' ')[0]}</div>`:''}
    </div>`;
  }
  html+=`</div><div id="takvim-detay" style="margin-top:8px"></div>`;
  el.innerHTML=html;
}

function takvimGunDetay(g,ay,yil) {
  const tarih=new Date(yil,ay,g);
  const gun=tarih.getDay();
  const gunDersler=data.filter(o=>o.gunler&&o.gunler.includes(gun)&&efektifKalan(o)>0);
  const el=document.getElementById('takvim-detay');
  const tatilAdi=tatilMi(yil,ay,g);
  let detayHtml='';
  if(tatilAdi){
    detayHtml+=`<div style="background:#FFF0EC;border:1px solid #F4B8A8;color:#C03010;border-radius:10px;padding:10px 14px;margin:8px 16px;font-size:13px">🇹🇷 <strong>${tatilAdi}</strong></div>`;
  }
  if(!gunDersler.length){el.innerHTML=detayHtml+`<div class="alert a-blue" style="margin:8px 16px">Bu gün ders yok.</div>`;return;}
  const saatGruplari={};
  gunDersler.forEach(o=>{const s=o.saat||'--:--';if(!saatGruplari[s])saatGruplari[s]=[];saatGruplari[s].push(o);});
  let html=`<div class="section-title">${g} - ${['Paz','Pzt','Sal','Çar','Per','Cum','Cmt'][gun]} Dersleri</div>`;
  Object.keys(saatGruplari).sort().forEach(saat=>{
    const ogrs=saatGruplari[saat];
    const tur=ogrs[0].tur;
    const max=tur==='ems'?2:3;
    html+=`<div class="ders-item">
      <div class="ders-saat">${saat}</div>
      <div class="ders-divider"></div>
      <div class="ders-info">
        <div class="ders-ad">${tur==='ems'?'⚡ EMS':'🧘 Pilates'}</div>
        <div class="ders-alt">${ogrs.map(o=>o.ad).join(', ')} · ${ogrs.length}/${max}</div>
      </div>
    </div>`;
  });
  el.innerHTML=html;
}

// ── ÖDEME ONAYLA ──
async function odemeOnayla(i) {
  const o=data[i];
  const kalanMevcut=efektifKalan(o);
  const yeniPaket=o.paket||20;
  const borcMesaj=o.borc>0?`\n💸 ${o.borc} ders borcu yeni paketten düşülecek`:'';
  const netKalan=kalanMevcut+yeniPaket-(o.borc||0);
  const msg=`${o.ad} ödeme onaylansın mı?\n\n📦 Yeni paket: ${yeniPaket} ders${borcMesaj}\n✅ Mevcut kalan: ${kalanMevcut} ders\n🎯 Net yeni kalan: ${netKalan} ders`;
  if(!confirm(msg))return;
  data[i].odemeBekliyor=false;
  data[i].toplam_paket=(o.toplam_paket||o.paket||20)+yeniPaket-(o.borc||0); // Borcu yeni paketten düş
  data[i].borc=0;
  const b=new Date();
  data[i].baslangic=`${b.getFullYear()}-${pad(b.getMonth()+1)}-${pad(b.getDate())}`;
  gosterYukleniyor();
  try{
    await ogrKaydet(data[i]);
    if(o.ucret>0) await gelirKaydet({tip:'gelir',tutar:o.ucret,acik:`${o.ad} — ${o.tur==='ems'?'EMS':'Pilates'} paket ödemesi`,tarih:todayStr()});
    await veriYukle();
    renderAna();
    alert(`✅ Ödeme onaylandı!\n${o.ad} şimdi ${kalanMevcut+yeniPaket} dersi var.`);
  }catch(e){alert('Hata: '+e.message);}
  finally{gizleYukleniyor();}
}

// ── PAKİ YENİLE ──
async function pakiYenile(i) {
  const o=data[i];
  const kalanMevcut = efektifKalan(o);
  const yeniPaket = o.paket||20;
  // Kalan dersler yeni pakete eklenir, yapilan HİÇ sıfırlanmaz
  const yeniToplam = (o.toplam_paket||o.paket||20) + yeniPaket;
  const borcVar=o.borc>0?`\n💸 ${o.borc} ders borcu yeni paketten düşülecek`:'';
  const netYeniKalan=kalanMevcut+yeniPaket-(o.borc||0);
  const msg = `${o.ad} paketi yenilensin mi?\n\n📦 Yeni paket: ${yeniPaket} ders${borcVar}\n✅ Mevcut kalan: ${kalanMevcut} ders\n🎯 Net kalan olacak: ${netYeniKalan} ders\n\nToplam yapılan ${o.yapilan||0} ders korunacak.`;
  if(!confirm(msg))return;
  // Borç yeni paketten düşülür:
  // Örn: 2 borç + 20 yeni ders = 18 net ders
  // toplam_paket'e yeniPaket ekle, borc sıfırla
  // yapilan değişmediği için efektifKalan otomatik doğru hesaplanır
  data[i].toplam_paket = yeniToplam - (o.borc||0); // Borcu düş
  data[i].borc = 0;
  // yapilan DEĞİŞMİYOR - birikimli devam eder
  const b=new Date();
  data[i].baslangic=`${b.getFullYear()}-${pad(b.getMonth()+1)}-${pad(b.getDate())}`;
  gosterYukleniyor();
  try{
    await ogrKaydet(data[i]);
    // Gelir kaydı
    if(o.ucret>0) await gelirKaydet({tip:'gelir',tutar:o.ucret,acik:`${o.ad} — Paket yenileme (${yeniPaket} ders)`,tarih:todayStr()});
    await veriYukle();
    renderOgr();renderAna();

// ── PDF.js WORKER ─────────────────────────────────────────────
async function pdfdenMetinCikar(file) {
  const arrayBuffer = await file.arrayBuffer();
  if (typeof pdfjsLib === 'undefined') {
    throw new Error('pdf.js yüklenmedi.');
  }
  pdfjsLib.GlobalWorkerOptions.workerSrc =
    'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
  const pdf = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
  let tamMetin = '';
  for (let i = 1; i <= pdf.numPages; i++) {
    const page = await pdf.getPage(i);
    const textContent = await page.getTextContent();
    const items = textContent.items;
    const satirlar = {};
    items.forEach(item => {
      const y = Math.round(item.transform[5]);
      if (!satirlar[y]) satirlar[y] = [];
      satirlar[y].push({ x: item.transform[4], text: item.str });
    });
    const siralanmis = Object.keys(satirlar)
      .sort((a, b) => b - a)
      .map(y => satirlar[y].sort((a, b) => a.x - b.x).map(i => i.text).join(' '));
    tamMetin += siralanmis.join('\n') + '\n';
  }
  return tamMetin;
}

function pdfVeriParse(metin) {
  const veri = {};

  function sayi(str) {
    if (!str) return null;
    const m = String(str).match(/([\d]+[,.]?[\d]*)/);
    if (!m) return null;
    const n = parseFloat(m[1].replace(',', '.'));
    return isNaN(n) ? null : n;
  }

  function bul(pattern, grupNo) {
    grupNo = grupNo || 1;
    const m = metin.match(pattern);
    return m ? sayi(m[grupNo]) : null;
  }

  // ── TARİH ──
  const tarihM = metin.match(/(\d{1,2})[./](\d{2})[./](\d{4})/);
  if (tarihM) {
    const [_, g, a, y] = tarihM;
    veri.tarih = y + '-' + String(a).padStart(2,'0') + '-' + String(g).padStart(2,'0');
  } else {
    veri.tarih = new Date().toISOString().split('T')[0];
  }

  // ── AD SOYAD ──
  // Format: "HATİCE BAŞOĞLU Sporcu Olmayan 47 160.0 75.7 ..."
  const adM = metin.match(/([A-ZÇĞIİÖŞÜ][A-ZÇĞIİÖŞÜ\s]{2,30})\s+(?:Sporcu|Normal|Obez|Zayıf)/);
  if (adM) veri.ad_soyad = adM[1].trim();

  // ── ANA TABLO SATIRI ──
  // Format: "HATİCE BAŞOĞLU Sporcu Olmayan 47 160.0 75.7 29.6 33,9 %"
  // Yaş Boy Kilo BMI Yağ% sırasıyla
  const tabloM = metin.match(/(\d{2,3})\s+(1[4-9]\d[.,]\d)\s+(\d{2,3}[.,]\d)\s+(\d{2}[.,]\d)\s+(\d{2}[.,]\d)/);
  if (tabloM) {
    veri.yas    = sayi(tabloM[1]);
    veri.boy    = sayi(tabloM[2]);
    veri.kilo   = sayi(tabloM[3]);
    veri.bmi    = sayi(tabloM[4]);
    veri.yag_yuzdesi = sayi(tabloM[5]);
  }

  // Kilo yedek: "Kilo" kelimesinden sonra 40-200 arası sayı
  if (!veri.kilo || veri.kilo < 30 || veri.kilo > 250) {
    const kiloM = metin.match(/Kilo\s+(\d{2,3}[.,]?\d*)/i);
    if (kiloM) {
      const k = sayi(kiloM[1]);
      if (k >= 30 && k <= 250) veri.kilo = k;
    }
  }

  // BMI yedek
  if (!veri.bmi) {
    const bmiM = metin.match(/BMI\s+(\d{2}[.,]\d)/i);
    if (bmiM) veri.bmi = sayi(bmiM[1]);
  }

  // Yağ% yedek - "Yağ Oranı (%)" satırından
  if (!veri.yag_yuzdesi) {
    const yagM = metin.match(/Yağ\s*Oranı\s*\(%\)\s*(\d{2,3}[,.]\d)/i);
    if (yagM) veri.yag_yuzdesi = sayi(yagM[1]);
  }

  // ── SEGMENTAL ──
  // "Yağ (%) 40.5 40.7 37.8 36.2 28.7"
  const yagSegM = metin.match(/Yağ\s*\(%\)\s+([\d.,\s]+)/i);
  if (yagSegM) {
    const vals = yagSegM[1].split(/\s+/)
      .map(v => parseFloat(v.replace(',','.')))
      .filter(v => !isNaN(v) && v > 0 && v < 100);
    if (vals[0]) veri.seg_sag_bacak_yag = vals[0];
    if (vals[1]) veri.seg_sol_bacak_yag = vals[1];
    if (vals[2]) veri.seg_sag_kol_yag   = vals[2];
    if (vals[3]) veri.seg_sol_kol_yag   = vals[3];
    if (vals[4]) veri.seg_govde_yag     = vals[4];
  }

  // "Kas(kg) 7.7 7.6 2.4 2.6 27.3"
  const kasSegM = metin.match(/Kas\s*\(kg\)\s+([\d.,\s]+)/i);
  if (kasSegM) {
    const vals = kasSegM[1].split(/\s+/)
      .map(v => parseFloat(v.replace(',','.')))
      .filter(v => !isNaN(v) && v > 0);
    if (vals[0]) veri.seg_sag_bacak_kas = vals[0];
    if (vals[1]) veri.seg_sol_bacak_kas = vals[1];
    if (vals[2]) veri.seg_sag_kol_kas   = vals[2];
    if (vals[3]) veri.seg_sol_kol_kas   = vals[3];
    if (vals[4]) veri.seg_govde_kas     = vals[4];
  }

  // ── KALORİ & METABOLİZMA ──
  // "Günlük Kalori İhtiyacı 2384 9.975"
  veri.gunluk_kalori = bul(/Günlük\s*Kalori\s*İhtiyacı\s*(\d{3,4})/i);

  // "BMR Bazal Metabolizma Hızı 1.597 6683" → 1597
  const bmrM = metin.match(/BMR\s*Bazal\s*Metabolizma[^0-9]*(\d[.,]\d{3}|\d{3,4})/i);
  if (bmrM) {
    let bmr = sayi(bmrM[1]);
    // "1.597" → 1597 (binlik nokta)
    if (bmr < 500) bmr = Math.round(bmr * 1000);
    veri.bmr = bmr;
  }

  // "İç Yağlanma 5" — ama "İç Yağlanma 5 BMI 29.6" satırı
  const icYagM = metin.match(/İç\s*Yağlanma\s*(\d{1,2})\s/i);
  if (icYagM) veri.ic_yaglama = sayi(icYagM[1]);

  // "Metabolizma Yaşı 43" — ama "Metabolizma Yaşı 43 BMR/Kilo 21" satırı
  // NOT: BMR/Kilo 21 → bunu kilo olarak alma!
  const metYasM = metin.match(/Metabolizma\s*Yaşı\s*(\d{2,3})\s/i);
  if (metYasM) veri.metabolizma_yasi = sayi(metYasM[1]);

  // "Yağ Ağırlığı(kg) 25,66"
  const yagAgirM = metin.match(/Yağ\s*Ağırlığı[^0-9]*(\d{2,3}[,.]\d{1,2})/i);
  if (yagAgirM) veri.yag_agirlik = sayi(yagAgirM[1]);

  // "Sıvı Ağırlığı (kg) 37,32"
  const siviAgirM = metin.match(/Sıvı\s*Ağırlığı[^0-9]*(\d{2,3}[,.]\d{1,2})/i);
  if (siviAgirM) veri.sivi_agirlik = sayi(siviAgirM[1]);

  // "Sıvı Oranı (%) 49.3"
  const siviOranM = metin.match(/Sıvı\s*Oranı\s*\(%\)\s*(\d{2}[.,]\d)/i);
  if (siviOranM) veri.su_yuzdesi = sayi(siviOranM[1]);

  // "Hedef Kilo 52"
  const hedefM = metin.match(/Hedef\s*Kilo\s*(\d{2,3})/i);
  if (hedefM) veri.hedef_kilo = sayi(hedefM[1]);

  // "Kemik Kütlesi 2.5"
  const kemikM = metin.match(/Kemik\s*Kütlesi\s*(\d[.,]\d)/i);
  if (kemikM) veri.kemik_kutlesi = sayi(kemikM[1]);

  // BMI yedek hesapla
  if (!veri.bmi && veri.kilo && veri.boy) {
    const boyM2 = veri.boy / 100;
    veri.bmi = Math.round((veri.kilo / (boyM2 * boyM2)) * 10) / 10;
  }

  // Temizle
  const temiz = {};
  Object.entries(veri).forEach(([k, v]) => {
    if (v !== null && v !== undefined && v !== '') temiz[k] = v;
  });
  return temiz;
}


async function pdfYukle(event) {
  const file = event.target.files[0];
  if (!file) return;
  const btn = document.getElementById('pdf-yukle-btn');
  const durum = document.getElementById('pdf-durum');
  if (btn) btn.style.opacity='0.6';
  if (durum) {
    durum.style.display = 'block';
    durum.innerHTML = '<div style="display:flex;align-items:center;gap:8px;color:var(--gold-dark);padding:8px 0"><div class="spinner" style="width:16px;height:16px;border-width:2px"></div><span>PDF okunuyor...</span></div>';
  }
  try {
    const metin = await pdfdenMetinCikar(file);
    const veri = pdfVeriParse(metin);
    const alanSayisi = Object.keys(veri).filter(k => k !== 'tarih' && k !== 'ad_soyad').length;
    if (alanSayisi === 0) throw new Error("PDF'den veri çıkarılamadı.");
    let eslenenOgr = null;
    if (veri.ad_soyad) {
      const adNorm = veri.ad_soyad.toUpperCase().trim();
      eslenenOgr = data.find(o => {
        const oAdNorm = o.ad.toUpperCase().trim();
        return oAdNorm === adNorm || oAdNorm.includes(adNorm) || adNorm.includes(oAdNorm);
      });
    }
    pdfOnayModali(veri, eslenenOgr);
  } catch (e) {
    if (durum) durum.innerHTML = '<div class="alert a-red">❌ ' + e.message + '</div>';
    else alert('❌ ' + e.message);
  } finally {
    if (btn) btn.style.opacity='1';
    event.target.value = '';
    if (durum) setTimeout(()=>{ durum.style.display='none'; }, 4000);
  }
}

async function pdfKaydet() {
  const ogrIdx = parseInt(document.getElementById('pdf-ogr-sec')?.value);
  const tarih  = document.getElementById('pdf-tarih')?.value;
  if (isNaN(ogrIdx) || !data[ogrIdx]) { alert('Öğrenci seçin!'); return; }
  if (!tarih) { alert('Tarih girin!'); return; }
  const o = data[ogrIdx];
  const f = (id) => {
    const el = document.getElementById('pdf-f-' + id);
    if (!el || !el.value) return null;
    const v = parseFloat(el.value);
    return isNaN(v) ? null : v;
  };
  const row = {
    ogrenci_id:o._id, tarih,
    kilo:f('kilo'), bmi:f('bmi'), yag_yuzdesi:f('yag_yuzdesi'),
    su_yuzdesi:f('su_yuzdesi'), kas_yuzdesi:f('kas_yuzdesi'),
    gunluk_kalori:f('gunluk_kalori'), bmr:f('bmr'),
    ic_yaglama:f('ic_yaglama'), metabolizma_yasi:f('metabolizma_yasi'),
    yag_agirlik:f('yag_agirlik'), sivi_agirlik:f('sivi_agirlik'),
    hedef_kilo:f('hedef_kilo'), kemik_kutlesi:f('kemik_kutlesi'),
    seg_sag_bacak_yag:f('seg_sag_bacak_yag'), seg_sol_bacak_yag:f('seg_sol_bacak_yag'),
    seg_sag_kol_yag:f('seg_sag_kol_yag'),     seg_sol_kol_yag:f('seg_sol_kol_yag'),
    seg_govde_yag:f('seg_govde_yag'),
    seg_sag_bacak_kas:f('seg_sag_bacak_kas'), seg_sol_bacak_kas:f('seg_sol_bacak_kas'),
    seg_sag_kol_kas:f('seg_sag_kol_kas'),     seg_sol_kol_kas:f('seg_sol_kol_kas'),
    seg_govde_kas:f('seg_govde_kas'),
  };
  Object.keys(row).forEach(k => { if (row[k] === null) delete row[k]; });
  const saveBtn = document.querySelector('#pdf-modal button:last-child');
  if (saveBtn) { saveBtn.disabled=true; saveBtn.textContent='⏳ Kaydediliyor...'; }
  try {
    const { error } = await sb.from('olcumler').insert(row);
    if (error) throw error;
    document.getElementById('pdf-modal')?.remove();
    const toast = document.createElement('div');
    toast.style.cssText = 'position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:#5A8A5A;color:white;padding:12px 20px;border-radius:10px;font-size:13px;font-weight:600;z-index:9998;box-shadow:0 4px 16px rgba(0,0,0,.2)';
    toast.textContent = '✅ ' + o.ad + ' için ölçüm kaydedildi!';
    document.body.appendChild(toast);
    setTimeout(() => toast.remove(), 3500);
    olcumOgrIdx = ogrIdx;
    renderOlcum();
  } catch(e) {
    alert('❌ Kayıt hatası: ' + e.message);
    if (saveBtn) { saveBtn.disabled=false; saveBtn.textContent="💾 Supabase'e Kaydet"; }
  }
}

async function renderOlcum() {
  const el = document.getElementById('olcum-c');
  if (!data.length) { el.innerHTML='<div class="alert a-blue" style="margin:12px 16px">Önce öğrenci ekle.</div>'; return; }
  const o = data[olcumOgrIdx];
  gosterYukleniyor();
  try {
    const {data:d,error} = await sb.from('olcumler').select('*').eq('ogrenci_id',o._id).order('tarih',{ascending:true});
    if (!error) olcumler = d||[];
  } catch(e) { olcumler=[]; }
  gizleYukleniyor();
  const son = olcumler.length ? olcumler[olcumler.length-1] : null;
  const ilk = olcumler.length > 1 ? olcumler[0] : null;
  let html = `
  <div style="padding:12px 16px 8px;display:flex;gap:8px;align-items:center;flex-wrap:wrap;border-bottom:1px solid var(--border)">
    <select style="flex:1;min-width:130px" onchange="olcumOgrIdx=parseInt(this.value);renderOlcum()">
      ${data.map((d,i)=>'<option value="'+i+'"'+(i===olcumOgrIdx?' selected':'')+'>'+d.ad+'</option>').join('')}
    </select>
    <label id="pdf-yukle-btn" style="display:inline-flex;align-items:center;gap:6px;padding:7px 14px;background:linear-gradient(135deg,#975B09,#946C18);color:white;border-radius:8px;cursor:pointer;font-size:12px;font-weight:700;letter-spacing:.5px;box-shadow:0 2px 8px rgba(148,108,24,.25)">
      📄 PDF Yükle
      <input type="file" accept=".pdf" style="display:none" onchange="pdfYukle(event)">
    </label>
    <button class="btn btn-ghost btn-sm" onclick="manuelOlcumEkle()">➕ Manuel</button>
  </div>
  <div id="pdf-durum" style="display:none;padding:0 16px"></div>`;

  if (!son) {
    html += '<div class="alert a-blue" style="margin:12px 16px">📄 '+o.ad+' için henüz ölçüm yok. Yukaridaki PDF Yukle butonunu kullanin.</div>';
    el.innerHTML = html; return;
  }
  const kiloFark = ilk ? ((son.kilo||0)-(ilk.kilo||0)).toFixed(1) : null;
  const hasSeg = son.seg_sag_bacak_yag || son.seg_sol_bacak_yag;

  // Metrikler
  html += '<div style="display:grid;grid-template-columns:repeat(4,1fr);gap:8px;padding:12px 16px 8px">';
  if(son.kilo) html+='<div class="metric-card" style="border-top:3px solid var(--gold-dark)"><div class="metric-label">KİLO</div><div style="font-size:24px;font-weight:800;font-family:Georgia,serif">'+son.kilo+'</div>'+(kiloFark?'<div style="font-size:11px;font-weight:600;color:'+(parseFloat(kiloFark)<0?'var(--green)':'var(--red)')+'">'+( parseFloat(kiloFark)>0?'+':'')+kiloFark+'kg</div>':'')+'</div>';
  if(son.yag_yuzdesi) html+='<div class="metric-card" style="border-top:3px solid #E07020"><div class="metric-label">YAĞ%</div><div style="font-size:24px;font-weight:800;color:#E07020;font-family:Georgia,serif">'+son.yag_yuzdesi+'%</div></div>';
  if(son.bmi) html+='<div class="metric-card" style="border-top:3px solid var(--blue)"><div class="metric-label">BMI</div><div style="font-size:24px;font-weight:800;color:var(--blue);font-family:Georgia,serif">'+son.bmi+'</div><div style="font-size:9px;color:var(--text3)">'+( son.bmi<25?'Normal':son.bmi<30?'Fazla':'Obez')+'</div></div>';
  if(son.gunluk_kalori) html+='<div class="metric-card" style="border-top:3px solid var(--green)"><div class="metric-label">KALORİ</div><div style="font-size:20px;font-weight:800;color:var(--green);font-family:Georgia,serif">'+son.gunluk_kalori+'</div><div style="font-size:9px;color:var(--text3)">kcal/gün</div></div>';
  html += '</div>';

  // Fark analizi
  if (ilk) {
    const fs=[['Kilo','kilo','kg'],['Yağ%','yag_yuzdesi','%'],['Sıvı%','su_yuzdesi','%'],['Yağ kg','yag_agirlik','kg']];
    html+='<div style="padding:0 16px 8px"><div style="font-size:10px;font-weight:700;color:var(--gold-dark);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:8px">FARK ANALİZİ</div><div style="background:var(--card);border:1px solid var(--border);border-radius:10px;overflow:hidden"><table style="width:100%;font-size:11px;border-collapse:collapse"><thead><tr style="background:var(--card2)"><th style="padding:7px 10px;text-align:left;color:var(--text3)">Alan</th><th style="padding:7px 8px;text-align:center;color:var(--text3)">'+new Date(ilk.tarih).toLocaleDateString("tr-TR",{day:"2-digit",month:"2-digit"})+'</th><th style="padding:7px 8px;text-align:center;color:var(--text3)">'+new Date(son.tarih).toLocaleDateString("tr-TR",{day:"2-digit",month:"2-digit"})+'</th><th style="padding:7px 8px;text-align:center;color:var(--text3)">Fark</th></tr></thead><tbody>';
    fs.forEach(([label,key,unit])=>{
      const v1=ilk[key],v2=son[key];
      if(!v1||!v2)return;
      const f=(v2-v1).toFixed(1);
      const r=parseFloat(f)===0?'var(--text3)':parseFloat(f)<0?'var(--green)':'var(--red)';
      html+='<tr style="border-bottom:0.5px solid var(--border)"><td style="padding:7px 10px;color:var(--text2)">'+label+'</td><td style="padding:7px 8px;text-align:center">'+v1+unit+'</td><td style="padding:7px 8px;text-align:center;font-weight:600">'+v2+unit+'</td><td style="padding:7px 8px;text-align:center;font-weight:700;color:'+r+'">'+(parseFloat(f)>0?'+':'')+f+unit+'</td></tr>';
    });
    html+='</tbody></table></div></div>';
  }

  // Segmental + Metabolizma
  if (hasSeg || son.bmr) {
    html+='<div style="display:grid;grid-template-columns:'+(window.innerWidth>=768?'1fr 1fr':'1fr')+';gap:12px;padding:0 16px 8px">';
    if(hasSeg){
      html+='<div><div style="font-size:10px;font-weight:700;color:var(--gold-dark);letter-spacing:1.5px;margin-bottom:8px">SEGMENTAL</div><div style="background:var(--card);border:1px solid var(--border);border-radius:10px;overflow:hidden"><table style="width:100%;font-size:11px;border-collapse:collapse"><thead><tr style="background:var(--card2)"><th style="padding:7px 10px;text-align:left;color:var(--text3)">Bölge</th><th style="padding:7px 8px;text-align:center;color:var(--text3)">Yağ%</th><th style="padding:7px 8px;text-align:center;color:var(--text3)">Kas kg</th></tr></thead><tbody>';
      [['Sağ Bacak','seg_sag_bacak'],['Sol Bacak','seg_sol_bacak'],['Sağ Kol','seg_sag_kol'],['Sol Kol','seg_sol_kol'],['Gövde','seg_govde']].forEach(([n,k])=>{
        const y=son[k+'_yag'],m=son[k+'_kas'];
        if(!y)return;
        const r=y<25?'var(--green)':y<32?'var(--gold-dark)':y<40?'#E07020':'var(--red)';
        html+='<tr style="border-bottom:0.5px solid var(--border)"><td style="padding:6px 10px;color:var(--text2)">'+n+'</td><td style="padding:6px 8px;text-align:center"><span style="font-weight:700;color:'+r+'">'+y+'%</span></td><td style="padding:6px 8px;text-align:center;color:var(--blue);font-weight:600">'+(m?m+'kg':'-')+'</td></tr>';
      });
      html+='</tbody></table></div></div>';
    }
    if(son.bmr||son.metabolizma_yasi||son.ic_yaglama){
      html+='<div><div style="font-size:10px;font-weight:700;color:var(--gold-dark);letter-spacing:1.5px;margin-bottom:8px">METABOLİZMA</div><div style="background:var(--card);border:1px solid var(--border);border-radius:10px;padding:12px;display:flex;flex-direction:column;gap:6px">';
      if(son.bmr) html+='<div style="display:flex;justify-content:space-between;font-size:12px;padding-bottom:5px;border-bottom:0.5px solid var(--border)"><span style="color:var(--text2)">BMR</span><strong>'+son.bmr+' kcal</strong></div>';
      if(son.metabolizma_yasi) html+='<div style="display:flex;justify-content:space-between;font-size:12px;padding-bottom:5px;border-bottom:0.5px solid var(--border)"><span style="color:var(--text2)">Met. Yaşı</span><strong style="color:'+(son.metabolizma_yasi>50?'var(--red)':'var(--green)')+'">'+son.metabolizma_yasi+'</strong></div>';
      if(son.ic_yaglama) html+='<div style="display:flex;justify-content:space-between;font-size:12px;padding-bottom:5px;border-bottom:0.5px solid var(--border)"><span style="color:var(--text2)">İç Yağ</span><strong style="color:'+(son.ic_yaglama>5?'var(--red)':'var(--green)')+'">'+son.ic_yaglama+'/10</strong></div>';
      if(son.hedef_kilo) html+='<div style="display:flex;justify-content:space-between;font-size:12px"><span style="color:var(--text2)">Hedef Kilo</span><strong style="color:var(--green)">'+son.hedef_kilo+' kg</strong></div>';
      html+='</div></div>';
    }
    html+='</div>';
  }

  // Tüm ölçümler tablosu - aylık gruplu
  html+='<div style="padding:0 16px 16px"><div style="font-size:10px;font-weight:700;color:var(--gold-dark);letter-spacing:1.5px;margin-bottom:8px">TÜM ÖLÇÜMLER</div><div style="background:var(--card);border:1px solid var(--border);border-radius:10px;overflow:auto"><table style="width:100%;font-size:11px;border-collapse:collapse;min-width:320px"><thead><tr style="background:var(--card2)"><th style="padding:8px 10px;text-align:left;color:var(--text2)">Tarih</th><th style="padding:8px 6px;text-align:center;color:var(--text2)">Kilo</th><th style="padding:8px 6px;text-align:center;color:var(--text2)">Yağ%</th><th style="padding:8px 6px;text-align:center;color:var(--text2)">BMI</th><th style="padding:8px 6px;text-align:center;color:var(--text2)">Sıvı%</th><th style="padding:8px 6px"></th></tr></thead><tbody>';
  const aylar2=['Ocak','Şubat','Mart','Nisan','Mayıs','Haziran','Temmuz','Ağustos','Eylül','Ekim','Kasım','Aralık'];
  const gruplar={};
  olcumler.forEach(ol=>{const d=new Date(ol.tarih);const k=d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0');if(!gruplar[k])gruplar[k]=[];gruplar[k].push(ol);});
  Object.keys(gruplar).sort().reverse().forEach(ay=>{

    html+='<tr style="background:var(--card2)"><td colspan="6" style="padding:6px 10px;font-size:11px;font-weight:700;color:var(--gold-dark);letter-spacing:1px">'+aylar2[parseInt(m)-1]+' '+yil+'</td></tr>';
    gruplar[ay].slice().reverse().forEach(ol=>{

    });

  el.innerHTML = html;
}

window._silOlcum = async function(id) {
  if(!confirm('Bu ölçüm silinsin mi?')) return;
  gosterYukleniyor();
  try {
    const {error} = await sb.from('olcumler').delete().eq('id', id);
    if(error) throw error;
    const toast = document.createElement('div');
    toast.style.cssText = 'position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:#C03010;color:white;padding:10px 18px;border-radius:10px;font-size:13px;font-weight:600;z-index:9998;box-shadow:0 4px 14px rgba(0,0,0,.2)';
    toast.textContent = '🗑 Ölçüm silindi';
    document.body.appendChild(toast);
    setTimeout(() => toast.remove(), 2500);
    await renderOlcum();
  } catch(e) {
    alert('Hata: ' + e.message);
  } finally {
    gizleYukleniyor();
  }
};

async function olcumSil(id){
  if(!confirm('Bu ölçüm silinsin mi?'))return;
  gosterYukleniyor();
  try{
    const {error}=await sb.from('olcumler').delete().eq('id',id);
    if(error)throw error;
    const toast=document.createElement('div');
    toast.style.cssText='position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:#C03010;color:white;padding:10px 18px;border-radius:10px;font-size:13px;font-weight:600;z-index:9998';

    setTimeout(()=>toast.remove(),2500);

  }catch(e){alert('Hata: '+e.message);}
  finally{gizleYukleniyor();}
}


function olcumRaporu(idx){
  const o=data[idx];
  if(!olcumler.length)return'Ölçüm yok.';
  const son=olcumler[olcumler.length-1];
  const ilk=olcumler[0];
  const kiloFark=olcumler.length>1?((son.kilo||0)-(ilk.kilo||0)).toFixed(1):null;
  return `DUMANSSTUDIO — ${o.ad} Ölçüm Raporu\n\n📅 Son ölçüm: ${new Date(son.tarih).toLocaleDateString('tr-TR')}\n⚖️ Kilo: ${son.kilo||'-'} kg\n🔥 Yağ: ${son.yag_yuzdesi||'-'}%\n💪 Kas: ${son.kas_yuzdesi||'-'}%\n📊 BMI: ${son.bmi||'-'}${kiloFark!==null?`\n\n📈 Değişim: ${kiloFark>0?'+':''}${kiloFark} kg`:''}\n\nDUMANSSTUDIO | Sakarya`;
}

async function olcumMailGonder(idx){
  const o=data[idx];
  if(!o.mail){alert('Mail adresi yok!');return;}
  await mailGonder(o.mail,'DUMANSSTUDIO — Ölçüm Raporunuz',olcumRaporu(idx));
}

function olcumWaGonder(idx){
  const o=data[idx];
  if(!o.tel){alert('Telefon yok!');return;}
  const numara=(o.tel||'').replace(/\D/g,'');
  const intNum=numara.startsWith('0')?'90'+numara.slice(1):numara;
  window.open(`https://wa.me/${intNum}?text=${encodeURIComponent(olcumRaporu(idx))}`,'_blank');
}

async function mailGonder(adres,konu,mesaj){

}

async function topluHatirlatma(){
  const liste=data.filter(o=>(efektifKalan(o)<=3&&efektifKalan(o)>0)||kalanDers(o)===0||gecikmiMi(o));
  if(!liste.length){alert('Hatırlatma gereken öğrenci yok!');return;}
  if(!confirm(`${liste.length} öğrenciye hatırlatma gönderilsin mi?`))return;
  for(const o of liste){
    if(o.mail){
      const mesaj=`Merhaba ${o.ad} Hanım,\n\n${efektifKalan(o)<=0?'Paketinizin süresi dolmuştur.':efektifKalan(o)<=3?`Son ${efektifKalan(o)} dersiniz kaldı.`:'Ödeme zamanınız geldi.'}\n\nDUMANSSTUDIO`;
      await mailGonder(o.mail,'DUMANSSTUDIO — Hatırlatma',mesaj);
    }
  }
}

async function kaydet(){
  const ad=document.getElementById('f-ad')?.value?.trim();
  if(!ad){alert('Ad zorunlu!');return;}
  const gunler=Array.from(document.querySelectorAll('input[type=checkbox]:checked')).filter(c=>c.id!=='f-ilkodeme').map(c=>parseInt(c.value));
  const tur=document.getElementById('f-tur')?.value||'pilates';
  const saat=document.getElementById('f-saat')?.value||'';

  // Kapasite kontrolü
  if(duzenlemeIdx===-1){
    const ayniSaatGun=data.filter(o=>o.tur===tur&&o.saat===saat&&gunler.some(g=>(o.gunler||[]).includes(g)));
    const max=tur==='ems'?2:3;
    if(ayniSaatGun.length>=max){alert(`❌ ${tur.toUpperCase()} dersinde bu saat dolu! (max ${max} kişi)`);return;}
  }

  const ilkOdemeAlindi=document.getElementById('f-ilkodeme')?!document.getElementById('f-ilkodeme').checked:true;
  const o={
    _id: duzenlemeIdx>-1?data[duzenlemeIdx]._id:undefined,
    ad, tel:document.getElementById('f-tel')?.value||'',
    mail:document.getElementById('f-mail')?.value||'',
    tur, paket:parseInt(document.getElementById('f-paket')?.value)||20,
    ucret:parseFloat(document.getElementById('f-ucret')?.value)||0,
    saat, gunler, iptalHakki:parseInt(document.getElementById('f-iptal')?.value)??1,
    yapilan:duzenlemeIdx>-1?data[duzenlemeIdx].yapilan:0,
    borc:duzenlemeIdx>-1?data[duzenlemeIdx].borc:0,
    baslangic:duzenlemeIdx>-1?data[duzenlemeIdx].baslangic:null,
    odemeBekliyor:false, ilkOdemeAlindi,
  };

  gosterYukleniyor();
  try{
    await ogrKaydet(o);
    if(duzenlemeIdx>-1){data[duzenlemeIdx]=o;}
    else{
      data.push(o);
      if(!ilkOdemeAlindi){alert(`✅ ${o.ad} eklendi!\nİlk ödeme bekleniyor — Ana sayfada onaylayabilirsiniz.`);}
      else{alert(`✅ ${o.ad} eklendi!`);}
    }
    await veriYukle();
    duzenlemeIdx=-1;
    renderEkleForm();
    renderAna();
    sp('ogr');
  }catch(e){alert('Hata: '+e.message);}
  finally{gizleYukleniyor();}
}


// ── AI DİYET MODÜLÜ ──
// Gemini API - ücretsiz (dakikada 60 istek, günde 1500)
const GEMINI_KEY = 'AIzaSyD-BURAYA_GEMINI_API_KEY_YAZIN'; // console.cloud.google.com'dan al
const GEMINI_URL = 'https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent';

let diyetGecmis = JSON.parse(localStorage.getItem('ds_diyet_gecmis')||'[]');
let diyetYukleniyor = false;

        AI, pilates ve EMS öğrencilerinize özel günlük diyet menüsü oluşturur. Tüm öğrencilere WhatsApp ile gönderebilirsiniz.
      </div>
      <div style="margin-bottom:10px">
        <div class="field-label">MENÜ TÜRÜ</div>
        <select id="diyet-tur" style="width:100%">
          <option value="genel">Genel Sağlıklı Beslenme</option>

        <div class="field-label">EKSTRA NOT (isteğe bağlı)</div>

      </button>
    </div>
    
    <div id="diyet-sonuc" style="display:none" class="card" style="margin-bottom:12px">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">

        </button>
        <button class="btn btn-ghost btn-sm" onclick="diyetKaydet()">
          💾 Kaydet
        </button>

    </div>

    <div id="diyet-api-uyari" class="alert a-gold" style="margin:0 0 12px;display:${GEMINI_KEY.includes('BURAYA')?'block':'none'}">
      ⚠️ Gemini API anahtarı henüz ayarlanmamış.

async function aiDiyetOlustur() {
  if(GEMINI_KEY.includes('BURAYA')) {
    alert('❌ Önce Gemini API anahtarı gerekli!\n\nhttps://aistudio.google.com/app/apikey adresinden ücretsiz alabilirsiniz.');
    return;
  }
  if(diyetYukleniyor) return;
  diyetYukleniyor = true;
  
  const tur = document.getElementById('diyet-tur').value;
  const not = document.getElementById('diyet-not').value;
  const btn = document.getElementById('diyet-btn');
  btn.textContent = '⏳ AI menü hazırlıyor...';
  btn.disabled = true;

  const turAcik = {
    'genel': 'genel sağlıklı beslenme',
    'kilo-verme': 'kilo verme odaklı düşük kalorili',
    'kas-yapma': 'kas geliştirme ve protein ağırlıklı',
    'detoks': 'detoks ve hafif beslenme',
    'akdeniz': 'akdeniz diyeti'
  }[tur] || 'sağlıklı';

  const prompt = `Sen bir diyetisyen ve fitness uzmanısın. Pilates ve EMS antrenmanı yapan kişiler için ${turAcik} günlük diyet menüsü hazırla.
${not ? `Özel not: ${not}` : ''}

Türkçe olarak şu formatta hazırla:
🌅 KAHVALTI (yaklaşık kalori)
[yemekler listesi]

☀️ ARA ÖĞÜN (yaklaşık kalori)  
[yemekler listesi]

🍽️ ÖĞLE YEMEĞİ (yaklaşık kalori)
[yemekler listesi]

🌙 ARA ÖĞÜN (yaklaşık kalori)
[yemekler listesi]

🌃 AKŞAM YEMEĞİ (yaklaşık kalori)
[yemekler listesi]

💧 GÜNLÜK SU HEDEFİ: [miktar]
📊 TOPLAM KALORİ: [kalori]

💡 BUGÜNÜN İPUCU: [kısa motivasyon ve beslenme ipucu]

Pilates/EMS antrenmanı yapanların ihtiyaçlarını göz önünde bulundur. Gerçekçi ve uygulanabilir öneriler ver.`;

  try {
    const resp = await fetch(`${GEMINI_URL}?key=${GEMINI_KEY}`, {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({
        contents: [{parts: [{text: prompt}]}],
        generationConfig: {temperature: 0.7, maxOutputTokens: 1000}
      })
    });
    
    if(!resp.ok) throw new Error(`API hatası: ${resp.status}`);
    const result = await resp.json();
    const metin = result.candidates?.[0]?.content?.parts?.[0]?.text || 'Menü oluşturulamadı.';
    
    // Göster
    const sonucEl = document.getElementById('diyet-sonuc');
    sonucEl.style.display = 'block';
    document.getElementById('diyet-icerik').textContent = metin;
    document.getElementById('diyet-tarih').textContent = new Date().toLocaleDateString('tr-TR',{weekday:'long',day:'numeric',month:'long'});
    
    // Global sakla
    window._sonDiyet = {metin, tur: turAcik, tarih: new Date().toLocaleDateString('tr-TR')};
    
    sonucEl.scrollIntoView({behavior:'smooth', block:'start'});
    
  } catch(e) {
    alert('❌ AI bağlantı hatası: ' + e.message + '\n\nAPI anahtarınızı kontrol edin.');
  } finally {
    diyetYukleniyor = false;
    btn.textContent = '✨ AI ile Menü Oluştur';
    btn.disabled = false;
  }
}

function diyetKaydet() {
  if(!window._sonDiyet) return;
  const ozet = window._sonDiyet.metin.split('\n').slice(0,3).join(' ').substring(0,120)+'...';
  diyetGecmis.push({
    tarih: window._sonDiyet.tarih,
    tur: window._sonDiyet.tur,
    metin: window._sonDiyet.metin,
    ozet
  });
  if(diyetGecmis.length > 30) diyetGecmis = diyetGecmis.slice(-30);
  localStorage.setItem('ds_diyet_gecmis', JSON.stringify(diyetGecmis));
  alert('✅ Menü kaydedildi!');
  renderDiyet();
}

function diyetKopyala() {
  if(!window._sonDiyet) return;
  navigator.clipboard.writeText(window._sonDiyet.metin)
    .then(() => alert('✅ Menü kopyalandı!'))
    .catch(() => alert('Manuel kopyalayın:\n' + window._sonDiyet.metin));
}

function diyetTopluWa() {
  if(!window._sonDiyet) return;
  if(!data.length) {alert('Öğrenci yok!'); return;}
  
  const mesaj = `🥗 DUMANSSTUDIO — Bugünün Diyet Menüsü\n${new Date().toLocaleDateString('tr-TR',{weekday:'long',day:'numeric',month:'long'})}\n\n${window._sonDiyet.metin}\n\n💪 DUMANSSTUDIO | Sakarya`;
  
  const telList = data.filter(o=>o.tel).map(o=>({ad:o.ad, tel:o.tel}));
  if(!telList.length) {alert('Kayıtlı telefon numarası olan öğrenci yok!'); return;}
  
  if(!confirm(`${telList.length} öğrenciye WhatsApp ile diyet menüsü gönderilsin mi?`)) return;
  
  // İlk öğrenciye aç, kullanıcı diğerlerini manuel gönderecek
  // (WhatsApp API olmadan her birini ayrı ayrı açmak gerekiyor)
  let idx = 0;
  function sonrakiGonder() {
    if(idx >= telList.length) {
      alert(`✅ ${telList.length} öğrencinin WhatsApp penceresi açıldı!`);
      return;
    }
    const o = telList[idx];
    const numara = o.tel.replace(/\D/g,'');
    const intNum = numara.startsWith('0') ? '90'+numara.slice(1) : numara;
    window.open(`https://wa.me/${intNum}?text=${encodeURIComponent(mesaj)}`, '_blank');
    idx++;
    if(idx < telList.length) {
      setTimeout(sonrakiGonder, 1500); // Her 1.5 saniyede bir aç
    } else {
      alert(`✅ Tüm ${telList.length} öğrenciye gönderildi!`);
    }
  }
  sonrakiGonder();
}

function diyetGecmisGoster(i) {
  const d = diyetGecmis[i];
  if(!d) return;
  window._sonDiyet = {metin: d.metin, tur: d.tur, tarih: d.tarih};
  const sonucEl = document.getElementById('diyet-sonuc');
  if(sonucEl) {
    sonucEl.style.display = 'block';
    document.getElementById('diyet-icerik').textContent = d.metin;
    document.getElementById('diyet-tarih').textContent = d.tarih;
    sonucEl.scrollIntoView({behavior:'smooth'});
  }
}
